<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin:0; padding:0; }
  .grid { width:1500px; height:600px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); background:linear-gradient(135deg,#1e293b,#0f172a); box-sizing:border-box; }
  .cell { display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.08); position:relative; }
  .cell img { width:170px; height:170px; object-fit:contain; filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
  .cell .name { color:#fff; font-family: -apple-system,"Malgun Gothic",sans-serif; font-size:26px; font-weight:800; margin-top:6px; }
  .cell .badges { display:flex; gap:6px; margin-top:6px; }
  .cell .type { display:inline-flex; align-items:center; height:22px; padding:0 10px; border-radius:6px; font-size:12px; font-weight:700; color:#fff; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell">
    <img src="https://pokesol.app/api/images/assets/pokemons/1018.png">
    <div class="name">브리두라스</div>
    <div class="badges"><span class="type" style="background:#B8B8D0">강철</span><span class="type" style="background:#7038F8">드래곤</span></div>
  </div>
  <div class="cell">
    <img src="https://pokesol.app/api/images/assets/pokemons/0545.png">
    <div class="name">펜드라</div>
    <div class="badges"><span class="type" style="background:#A8B820">벌레</span><span class="type" style="background:#A040A0">독</span></div>
  </div>
  <div class="cell">
    <img src="https://pokesol.app/api/images/assets/pokemons/0358_01.png">
    <div class="name">메가치렁</div>
    <div class="badges"><span class="type" style="background:#F85888">에스퍼</span><span class="type" style="background:#B8B8D0">강철</span></div>
  </div>
  <div class="cell">
    <img src="https://pokesol.app/api/images/assets/pokemons/0730.png">
    <div class="name">누리레느</div>
    <div class="badges"><span class="type" style="background:#6890F0">물</span><span class="type" style="background:#EE99AC">페어리</span></div>
  </div>
  <div class="cell">
    <img src="https://pokesol.app/api/images/assets/pokemons/0445.png">
    <div class="name">한카리아스</div>
    <div class="badges"><span class="type" style="background:#7038F8">드래곤</span><span class="type" style="background:#E0C068">땅</span></div>
  </div>
  <div class="cell">
    <img src="https://pokesol.app/api/images/assets/pokemons/0121_01.png">
    <div class="name">메가아쿠스타</div>
    <div class="badges"><span class="type" style="background:#6890F0">물</span><span class="type" style="background:#F85888">에스퍼</span></div>
  </div>
</div>
</body>
</html>
