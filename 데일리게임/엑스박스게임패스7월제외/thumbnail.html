<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 85% 8%, rgba(236,72,153,0.24) 0%, rgba(236,72,153,0) 42%),
      radial-gradient(circle at 100% 55%, rgba(168,85,247,0.22) 0%, rgba(168,85,247,0) 46%),
      radial-gradient(circle at 90% 95%, rgba(45,212,191,0.24) 0%, rgba(45,212,191,0) 44%),
      linear-gradient(135deg, #050b0a 0%, #081210 45%, #0a0f16 100%);
    overflow:hidden;
  }
  .emblem {
    position:absolute; right:-100px; top:-100px;
    width:520px; height:520px; border-radius:50%;
    border:2px solid rgba(45,212,191,0.18);
  }
  .emblem::before {
    content:""; position:absolute; inset:60px; border-radius:50%;
    border:2px solid rgba(168,85,247,0.16);
  }
  .emblem::after {
    content:""; position:absolute; inset:120px; border-radius:50%;
    border:2px solid rgba(236,72,153,0.14);
  }
  .content {
    position:relative; z-index:2;
    padding:76px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:26px;
    background:rgba(45,212,191,0.14);
    border:1px solid rgba(45,212,191,0.55);
    border-radius:999px;
    color:#5eead4; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:40px; font-weight:800; color:#f1f5f9; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#2dd4bf; }
  .title-kr {
    margin-top:22px;
    font-size:34px; font-weight:700; color:#e2e8f0;
    line-height:1.45;
  }
  .title-kr b { color:#2dd4bf; }
  .sub {
    margin-top:28px;
    font-size:23px; color:#8a8f9a; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#3a4048; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="emblem"></div>
    <div class="content">
      <span class="tag">게임패스 라인업 변경 · 7월 31일</span>
      <div class="title-en">XBOX GAME <span class="hl">PASS</span></div>
      <div class="title-kr">셀레스테 등 <b>8종</b> 제외 확정</div>
      <div class="sub">크루세이더 킹즈 3·배너로드 포함 · 최대 20%+ 할인</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
