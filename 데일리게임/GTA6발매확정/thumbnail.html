<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 85% 15%, rgba(255,61,129,0.28) 0%, rgba(255,61,129,0) 45%),
      linear-gradient(135deg, #0a0510 0%, #1a0a24 45%, #200f33 100%);
    overflow:hidden;
  }
  .emblem {
    position:absolute; right:-100px; top:-100px;
    width:520px; height:520px; border-radius:50%;
    border:2px solid rgba(255,61,129,0.20);
  }
  .emblem::before {
    content:""; position:absolute; inset:60px; border-radius:50%;
    border:2px solid rgba(255,61,129,0.16);
  }
  .emblem::after {
    content:""; position:absolute; inset:120px; border-radius:50%;
    border:2px solid rgba(255,61,129,0.12);
  }
  .content {
    position:relative; z-index:2;
    padding:80px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:28px;
    background:rgba(255,61,129,0.15);
    border:1px solid rgba(255,61,129,0.55);
    border-radius:999px;
    color:#ff8fb3; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:48px; font-weight:800; color:#f1f5f9; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#ff3d81; }
  .title-kr {
    margin-top:22px;
    font-size:36px; font-weight:700; color:#e2e8f0;
    line-height:1.4;
  }
  .title-kr b { color:#ff3d81; }
  .sub {
    margin-top:30px;
    font-size:24px; color:#a889ac; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#5a4a70; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="emblem"></div>
    <div class="content">
      <span class="tag">AAA RELEASE CONFIRMED</span>
      <div class="title-en">GTA <span class="hl">VI</span> · NOV 19</div>
      <div class="title-kr">'GTA6' <b>11월 19일 정식 발매</b> 확정</div>
      <div class="sub">콘솔 우선 출시 · PC 버전 미정 · 13년 만의 컴백</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
