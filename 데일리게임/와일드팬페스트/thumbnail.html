<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 85% 15%, rgba(200,155,60,0.28) 0%, rgba(200,155,60,0) 45%),
      linear-gradient(135deg, #050a14 0%, #0a1428 45%, #0d1c33 100%);
    overflow:hidden;
  }
  .emblem {
    position:absolute; right:-100px; top:-100px;
    width:520px; height:520px; border-radius:50%;
    border:2px solid rgba(200,155,60,0.20);
  }
  .emblem::before {
    content:""; position:absolute; inset:60px; border-radius:50%;
    border:2px solid rgba(200,155,60,0.16);
  }
  .emblem::after {
    content:""; position:absolute; inset:120px; border-radius:50%;
    border:2px solid rgba(200,155,60,0.12);
  }
  .content {
    position:relative; z-index:2;
    padding:80px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:28px;
    background:rgba(200,155,60,0.15);
    border:1px solid rgba(200,155,60,0.55);
    border-radius:999px;
    color:#e8c778; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:48px; font-weight:800; color:#f1f5f9; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#c89b3c; }
  .title-kr {
    margin-top:22px;
    font-size:36px; font-weight:700; color:#e2e8f0;
    line-height:1.4;
  }
  .title-kr b { color:#c89b3c; }
  .sub {
    margin-top:30px;
    font-size:24px; color:#7a8aa8; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#4a5a70; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="emblem"></div>
    <div class="content">
      <span class="tag">OFFLINE FAN FESTIVAL</span>
      <div class="title-en">WILD <span class="hl">FAN FEST</span></div>
      <div class="title-kr">라이엇 게임즈X현대백화점 <b>'와일드 팬페스트'</b></div>
      <div class="sub">TFT·리프트바운드·와일드 리프트 · 더현대 서울→판교점</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
