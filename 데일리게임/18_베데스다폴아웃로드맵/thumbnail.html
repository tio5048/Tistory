<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 88% 10%, rgba(217,119,6,0.22) 0%, rgba(217,119,6,0) 42%),
      radial-gradient(circle at 100% 60%, rgba(132,204,22,0.14) 0%, rgba(132,204,22,0) 46%),
      radial-gradient(circle at 85% 100%, rgba(180,83,9,0.24) 0%, rgba(180,83,9,0) 44%),
      linear-gradient(135deg, #0d0a06 0%, #171008 45%, #120c07 100%);
    overflow:hidden;
  }
  .cards {
    position:absolute; right:-40px; top:60px;
    width:460px; height:460px;
  }
  .card {
    position:absolute;
    width:150px; height:210px;
    border-radius:14px;
    background:linear-gradient(160deg, rgba(180,83,9,0.16), rgba(132,204,22,0.10));
    border:2px solid rgba(250,204,21,0.35);
  }
  .card::before {
    content:""; position:absolute; inset:14px;
    border:1px solid rgba(250,204,21,0.22); border-radius:8px;
  }
  .card.c1 { transform:rotate(-14deg); top:40px; left:120px; opacity:0.55; }
  .card.c2 { transform:rotate(6deg); top:10px; left:230px; opacity:0.8; }
  .card.c3 { transform:rotate(24deg); top:60px; left:320px; opacity:0.4; }
  .content {
    position:relative; z-index:2;
    padding:76px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:26px;
    background:rgba(250,204,21,0.14);
    border:1px solid rgba(250,204,21,0.55);
    border-radius:999px;
    color:#facc15; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:40px; font-weight:800; color:#f1ede4; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#84cc16; }
  .title-kr {
    margin-top:22px;
    font-size:34px; font-weight:700; color:#e7e1d3;
    line-height:1.45;
  }
  .title-kr b { color:#84cc16; }
  .sub {
    margin-top:28px;
    font-size:23px; color:#9c8f74; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#463d2c; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="cards">
      <div class="card c1"></div>
      <div class="card c2"></div>
      <div class="card c3"></div>
    </div>
    <div class="content">
      <span class="tag">베데스다 대형 로드맵 · 7월 17일</span>
      <div class="title-en">FALLOUT <span class="hl">3 · NV</span> REMASTER</div>
      <div class="title-kr"><b>폴아웃3·뉴베가스</b> 리마스터 공식화</div>
      <div class="sub">폴아웃5 프리프로덕션 · 엘더스크롤6 최우선 과제</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
